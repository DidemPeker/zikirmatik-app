<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Zikirmatik</title>

    <link rel="stylesheet" href="style.css?v=11" />

    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b2248" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Zikir" />
</head>

<body>
    <div class="background-decor" aria-hidden="true">
        <span class="moon">☾</span>
        <span class="star star-1">✦</span>
        <span class="star star-2">✦</span>
        <span class="star star-3">✦</span>
        <span class="dot dot-1"></span>
        <span class="dot dot-2"></span>
        <span class="dot dot-3"></span>
    
        <svg class="cat-reaching" viewBox="0 0 260 220" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path class="cat-line" d="M35 178
             C55 165, 62 140, 74 116
             C90 84, 120 64, 151 55
             L184 22
             C190 16, 198 22, 195 31
             L187 59
             C205 59, 216 70, 216 85
             C216 99, 205 108, 192 113
             C181 135, 168 158, 151 176
             C136 192, 116 202, 94 203
             C72 204, 52 196, 35 178Z" />
            <path class="cat-line" d="M78 115 C90 126, 103 132, 119 131" />
            <path class="cat-line" d="M151 55 C160 63, 171 66, 187 59" />
        </svg>
    </div>

    <main class="app">
        <h1>Zikirmatik</h1>

        <section class="card">
            <p class="label">Current zikir</p>
            <h2 id="dhikrName">SubhanAllah</h2>

            <div class="counter">
                <span id="count">0</span>
                <span class="target">/ <span id="target">33</span></span>
            </div>

            <button id="countButton" class="main-button" aria-label="Count one zikir">
                <span class="power-symbol">⏻</span>
            </button>

            <div class="actions">
                <button id="resetButton">Reset</button>
            </div>
        </section>
    </main>

    <script src="app.js?v=11"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Zikirmatik</title>

    <link rel="stylesheet" href="style.css?v=9" />

    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b2248" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Zikir" />
</head>

<body>
    <div class="background-decor" aria-hidden="true">
        <span class="moon">☾</span>
        <span class="star star-1">✦</span>
        <span class="star star-2">✦</span>
        <span class="star star-3">✦</span>
        <span class="star star-4">✦</span>
    
        <span class="dot dot-1"></span>
        <span class="dot dot-2"></span>
        <span class="dot dot-3"></span>
    
        <svg class="cat cat-left" viewBox="0 0 180 150" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path class="cat-line cat-white"
                d="M45 130 C34 112 34 84 54 66 L50 38 L72 55 C84 49 98 49 110 55 L132 38 L128 66 C148 84 148 112 137 130" />
            <path class="cat-line cat-white" d="M62 91 C72 100 84 100 90 91" />
            <path class="cat-line cat-white" d="M118 91 C108 100 96 100 90 91" />
            <path class="cat-line cat-white" d="M44 129 H138" />
            <path class="cat-line cat-white" d="M138 129 C162 126 166 104 150 94" />
        </svg>
    
        <svg class="cat cat-right" viewBox="0 0 180 150" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path class="cat-line cat-gold"
                d="M45 130 C34 112 34 84 54 66 L50 38 L72 55 C84 49 98 49 110 55 L132 38 L128 66 C148 84 148 112 137 130" />
            <path class="cat-line cat-gold" d="M62 91 C72 100 84 100 90 91" />
            <path class="cat-line cat-gold" d="M118 91 C108 100 96 100 90 91" />
            <path class="cat-line cat-gold" d="M44 129 H138" />
            <path class="cat-line cat-gold" d="M138 129 C162 126 166 104 150 94" />
        </svg>
    </div>

    <main class="app">
        <h1>Zikirmatik</h1>

        <section class="card">
            <p class="label">Current zikir</p>
            <h2 id="dhikrName">SubhanAllah</h2>

            <div class="counter">
                <span id="count">0</span>
                <span class="target">/ <span id="target">33</span></span>
            </div>

            <button id="countButton" class="main-button" aria-label="Count one zikir">
                <span class="power-symbol">⏻</span>
            </button>

            <div class="actions">
                <button id="resetButton">Reset</button>
            </div>
        </section>
    </main>

    <script src="app.js?v=9"></script>
</body>

</html>
